services:
  - type: web
    name: bg-removal-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: MODEL_PATH
        value: "/app/model/model_int8.onnx"
      - key: ENV
        value: "production"
    disk:
      name: model-storage
      mountPath: /app/model
      sizeGB: 1
